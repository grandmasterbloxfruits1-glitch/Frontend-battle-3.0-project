<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#172B36"/>
  <!-- Dot grid -->
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#D9E8E2" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow -->
  <radialGradient id="glow" cx="70%" cy="30%" r="50%">
    <stop offset="0%" stop-color="#FFC801" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#FFC801" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Logo mark -->
  <rect x="80" y="80" width="44" height="44" rx="8" stroke="#F1F6F4" stroke-width="3"/>
  <rect x="140" y="80" width="44" height="44" rx="8" stroke="#F1F6F4" stroke-width="3"/>
  <rect x="80" y="140" width="44" height="44" rx="8" stroke="#F1F6F4" stroke-width="3"/>
  <path d="M140 163h28M154 149v28" stroke="#FFC801" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="210" y="118" font-family="monospace" font-size="42" font-weight="700" fill="#F1F6F4" letter-spacing="-1">Axon</text>
  <!-- Tag -->
  <rect x="80" y="215" width="270" height="34" rx="17" fill="#FFC801" fill-opacity="0.12" stroke="#FFC801" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="101" cy="232" r="5" fill="#FFC801"/>
  <text x="115" y="237" font-family="monospace" font-size="13" font-weight="600" fill="#FFC801" letter-spacing="1">AI DATA AUTOMATION</text>
  <!-- Headline -->
  <text x="80" y="330" font-family="monospace" font-size="64" font-weight="700" fill="#F1F6F4" letter-spacing="-2">Your data pipeline,</text>
  <text x="80" y="410" font-family="monospace" font-size="64" font-weight="700" fill="#FFC801" letter-spacing="-2">automated by AI.</text>
  <!-- Stats row -->
  <text x="80" y="510" font-family="monospace" font-size="36" font-weight="700" fill="#F1F6F4">98.7<tspan font-size="20" fill="#FFC801">%</tspan></text>
  <text x="80" y="540" font-family="sans-serif" font-size="13" fill="#F1F6F4" fill-opacity="0.45">Uptime SLA</text>
  <line x1="220" y1="495" x2="220" y2="545" stroke="#F1F6F4" stroke-opacity="0.12" stroke-width="1"/>
  <text x="240" y="510" font-family="monospace" font-size="36" font-weight="700" fill="#F1F6F4">340<tspan font-size="20" fill="#FFC801">+</tspan></text>
  <text x="240" y="540" font-family="sans-serif" font-size="13" fill="#F1F6F4" fill-opacity="0.45">Connectors</text>
  <line x1="380" y1="495" x2="380" y2="545" stroke="#F1F6F4" stroke-opacity="0.12" stroke-width="1"/>
  <text x="400" y="510" font-family="monospace" font-size="36" font-weight="700" fill="#F1F6F4">12<tspan font-size="20" fill="#FFC801">ms</tspan></text>
  <text x="400" y="540" font-family="sans-serif" font-size="13" fill="#F1F6F4" fill-opacity="0.45">Median latency</text>
  <!-- Terminal panel -->
  <rect x="760" y="80" width="380" height="470" rx="16" fill="#0A1218" stroke="#D9E8E2" stroke-opacity="0.1" stroke-width="1.5"/>
  <rect x="760" y="80" width="380" height="46" rx="16" fill="#F1F6F4" fill-opacity="0.04"/>
  <circle cx="790" cy="103" r="6" fill="#FF5F57"/>
  <circle cx="812" cy="103" r="6" fill="#FFBD2E"/>
  <circle cx="834" cy="103" r="6" fill="#28C941"/>
  <text x="980" y="108" font-family="monospace" font-size="11" fill="#F1F6F4" fill-opacity="0.3" text-anchor="middle">axon pipeline — live</text>
  <text x="790" y="155" font-family="monospace" font-size="12" fill="#F1F6F4" fill-opacity="0.4">$ axon pipeline create</text>
  <text x="790" y="175" font-family="monospace" font-size="12" fill="#F1F6F4" fill-opacity="0.4">  --source postgres://prod</text>
  <text x="790" y="195" font-family="monospace" font-size="12" fill="#F1F6F4" fill-opacity="0.4">  --dest bigquery</text>
  <text x="790" y="230" font-family="monospace" font-size="12" fill="#4ade80">✓ Schema inferred (47 tables, 12ms)</text>
  <text x="790" y="252" font-family="monospace" font-size="12" fill="#4ade80">✓ Connector authenticated</text>
  <text x="790" y="274" font-family="monospace" font-size="12" fill="#4ade80">✓ Pipeline activated</text>
  <text x="790" y="310" font-family="monospace" font-size="11" fill="#F1F6F4" fill-opacity="0.35">STATUS</text>
  <text x="880" y="310" font-family="monospace" font-size="11" fill="#D9E8E2">streaming · 2.4M rows/hr</text>
  <text x="790" y="332" font-family="monospace" font-size="11" fill="#F1F6F4" fill-opacity="0.35">LATENCY</text>
  <text x="880" y="332" font-family="monospace" font-size="11" fill="#D9E8E2">11ms p50 · 28ms p99</text>
  <text x="790" y="354" font-family="monospace" font-size="11" fill="#F1F6F4" fill-opacity="0.35">ANOMALIES</text>
  <text x="880" y="354" font-family="monospace" font-size="11" fill="#4ade80">0 detected</text>
</svg>
